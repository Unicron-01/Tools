<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Annotator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #7c6aff;
    --accent2: #ff6a9e;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --glow: rgba(124, 106, 255, 0.4);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    overflow: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .hero {
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .hero h1 {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.75rem;
    letter-spacing: 0.05em;
  }

  /* Activate Button */
  #activateBtn {
    position: relative;
    z-index: 1;
    padding: 1rem 2.5rem;
    background: transparent;
    border: 1.5px solid var(--accent);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s ease;
    overflow: hidden;
  }

  #activateBtn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  #activateBtn:hover::before { opacity: 0.12; }

  #activateBtn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0);
    transition: transform 0.3s ease;
  }

  #activateBtn:hover::after { transform: scaleX(1); }

  #activateBtn.active {
    background: linear-gradient(135deg, var(--accent), #5b4ae8);
    border-color: transparent;
    box-shadow: 0 0 30px var(--glow), 0 0 60px rgba(124,106,255,0.15);
  }

  #activateBtn.active::before { display: none; }

  /* ======= FLOATING TOOLBAR ======= */
  #toolbar {
    position: fixed;
    top: 80px;
    right: 30px;
    z-index: 99999;
    background: rgba(13, 13, 20, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,255,255,0.04),
      inset 0 1px 0 rgba(255,255,255,0.06);
    transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    opacity: 0;
    transform: translateX(20px) scale(0.95);
    pointer-events: none;
    user-select: none;
  }

  #toolbar.visible {
    opacity: 1;
    transform: translateX(0) scale(1);
    pointer-events: all;
  }

  .toolbar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    text-align: center;
    padding: 4px 8px 2px;
  }

  .toolbar-divider {
    height: 1px;
    background: var(--border);
    margin: 2px 4px;
  }

  .tool-btn {
    width: 46px;
    height: 46px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    transition: all 0.18s ease;
    position: relative;
    color: var(--muted);
  }

  .tool-btn:hover {
    background: rgba(255,255,255,0.05);
    border-color: var(--border);
    color: var(--text);
  }

  .tool-btn.active {
    background: rgba(124, 106, 255, 0.15);
    border-color: rgba(124, 106, 255, 0.5);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(124,106,255,0.2);
  }

  .tool-btn svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  .tool-btn span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.05em;
    opacity: 0.7;
  }

  /* Color picker row */
  .color-row {
    display: flex;
    gap: 5px;
    padding: 2px 6px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .color-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }

  .color-dot:hover { transform: scale(1.25); }
  .color-dot.active { border-color: white; transform: scale(1.15); }

  /* Size slider */
  .size-wrap {
    padding: 4px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .size-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 6px var(--glow);
  }

  /* Deactivate at bottom */
  .deactivate-btn {
    width: 46px;
    height: 36px;
    background: rgba(255, 80, 80, 0.08);
    border: 1px solid rgba(255,80,80,0.2);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ff6060;
    transition: all 0.18s ease;
    font-size: 0.6rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
    flex-direction: column;
    gap: 2px;
  }

  .deactivate-btn:hover {
    background: rgba(255,80,80,0.18);
    border-color: rgba(255,80,80,0.5);
  }

  /* ======= DRAWING CANVAS ======= */
  #drawCanvas {
    position: fixed;
    inset: 0;
    z-index: 99998;
    pointer-events: none;
    display: block;
  }

  #drawCanvas.active-draw { pointer-events: all; }
  #drawCanvas.cursor-pencil { cursor: crosshair; }
  #drawCanvas.cursor-marker { cursor: crosshair; }
  #drawCanvas.cursor-eraser { cursor: cell; }
  #drawCanvas.cursor-mouse { cursor: default; }

  /* Status chip */
  #statusChip {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    z-index: 99999;
    background: rgba(13,13,20,0.9);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }

  #statusChip.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Drag handle */
  .drag-handle {
    width: 100%;
    height: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    padding-bottom: 2px;
  }

  .drag-handle:active { cursor: grabbing; }

  .drag-handle::after {
    content: '';
    width: 24px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
  }
</style>
</head>
<body>

<div class="hero">
  <h1>Screen Annotator</h1>
  <p>// draw on anything, anywhere</p>
</div>

<button id="activateBtn">⚡ Activate</button>

<!-- Canvas -->
<canvas id="drawCanvas"></canvas>

<!-- Floating Toolbar -->
<div id="toolbar">
  <div class="drag-handle" id="dragHandle"></div>
  <div class="toolbar-label">Tools</div>

  <button class="tool-btn active" id="toolMouse" title="Mouse">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 3l14 9-7 1-4 7L5 3z"/>
    </svg>
    <span>MOUSE</span>
  </button>

  <button class="tool-btn" id="toolPencil" title="Pencil">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
    </svg>
    <span>PENCIL</span>
  </button>

  <button class="tool-btn" id="toolMarker" title="Marker">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/>
    </svg>
    <span>MARKER</span>
  </button>

  <button class="tool-btn" id="toolEraser" title="Eraser">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/>
    </svg>
    <span>ERASER</span>
  </button>

  <div class="toolbar-divider"></div>
  <div class="toolbar-label">Color</div>

  <div class="color-row">
    <div class="color-dot active" style="background:#ffffff" data-color="#ffffff"></div>
    <div class="color-dot" style="background:#ff5f5f" data-color="#ff5f5f"></div>
    <div class="color-dot" style="background:#ffd166" data-color="#ffd166"></div>
    <div class="color-dot" style="background:#06d6a0" data-color="#06d6a0"></div>
    <div class="color-dot" style="background:#7c6aff" data-color="#7c6aff"></div>
    <div class="color-dot" style="background:#ff6a9e" data-color="#ff6a9e"></div>
    <div class="color-dot" style="background:#00c8ff" data-color="#00c8ff"></div>
    <div class="color-dot" style="background:#ff9500" data-color="#ff9500"></div>
  </div>

  <div class="toolbar-divider"></div>

  <div class="size-wrap">
    <div class="size-label">
      <span>SIZE</span>
      <span id="sizeVal">4px</span>
    </div>
    <input type="range" id="sizeSlider" min="1" max="40" value="4">
  </div>

  <div class="toolbar-divider"></div>

  <button class="tool-btn" id="clearBtn" title="Clear all">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
    </svg>
    <span>CLEAR</span>
  </button>

  <button class="deactivate-btn" id="deactivateBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/>
    </svg>
    <span>OFF</span>
  </button>
</div>

<!-- Status Chip -->
<div id="statusChip">● ANNOTATOR ACTIVE</div>

<script>
  // ======= STATE =======
  let isActive = false;
  let currentTool = 'mouse';
  let currentColor = '#ffffff';
  let currentSize = 4;
  let isDrawing = false;
  let lastX = 0, lastY = 0;

  // ======= ELEMENTS =======
  const activateBtn = document.getElementById('activateBtn');
  const toolbar = document.getElementById('toolbar');
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  const statusChip = document.getElementById('statusChip');
  const sizeSlider = document.getElementById('sizeSlider');
  const sizeVal = document.getElementById('sizeVal');

  const toolBtns = {
    mouse: document.getElementById('toolMouse'),
    pencil: document.getElementById('toolPencil'),
    marker: document.getElementById('toolMarker'),
    eraser: document.getElementById('toolEraser'),
  };

  // ======= CANVAS RESIZE =======
  function resizeCanvas() {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.putImageData(imageData, 0, 0);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // ======= ACTIVATE / DEACTIVATE =======
  function activate() {
    isActive = true;
    activateBtn.classList.add('active');
    activateBtn.textContent = '● Active';
    toolbar.classList.add('visible');
    statusChip.classList.add('show');
    setTool('mouse');
  }

  function deactivate() {
    isActive = false;
    activateBtn.classList.remove('active');
    activateBtn.textContent = '⚡ Activate';
    toolbar.classList.remove('visible');
    statusChip.classList.remove('show');
    canvas.classList.remove('active-draw', 'cursor-pencil', 'cursor-marker', 'cursor-eraser', 'cursor-mouse');
    canvas.style.pointerEvents = 'none';
  }

  activateBtn.addEventListener('click', () => {
    if (isActive) deactivate(); else activate();
  });

  document.getElementById('deactivateBtn').addEventListener('click', deactivate);

  // ======= TOOL SELECTION =======
  function setTool(tool) {
    currentTool = tool;
    Object.keys(toolBtns).forEach(k => toolBtns[k].classList.remove('active'));
    toolBtns[tool].classList.add('active');

    canvas.classList.remove('active-draw', 'cursor-pencil', 'cursor-marker', 'cursor-eraser', 'cursor-mouse');

    if (tool === 'mouse') {
      canvas.style.pointerEvents = 'none';
      canvas.classList.add('cursor-mouse');
    } else {
      canvas.style.pointerEvents = 'all';
      canvas.classList.add('active-draw');
      canvas.classList.add(`cursor-${tool}`);
    }
  }

  Object.keys(toolBtns).forEach(k => {
    toolBtns[k].addEventListener('click', () => setTool(k));
  });

  // ======= COLOR PICKER =======
  document.querySelectorAll('.color-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
      dot.classList.add('active');
      currentColor = dot.dataset.color;
    });
  });

  // ======= SIZE SLIDER =======
  sizeSlider.addEventListener('input', () => {
    currentSize = parseInt(sizeSlider.value);
    sizeVal.textContent = currentSize + 'px';
  });

  // ======= DRAWING =======
  function getPos(e) {
    if (e.touches) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  function startDraw(e) {
    if (!isActive || currentTool === 'mouse') return;
    isDrawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;

    if (currentTool !== 'eraser') {
      ctx.beginPath();
      ctx.arc(lastX, lastY, getLineWidth() / 2, 0, Math.PI * 2);
      ctx.fillStyle = currentColor;
      ctx.fill();
    }
  }

  function getLineWidth() {
    if (currentTool === 'marker') return currentSize * 3;
    if (currentTool === 'eraser') return currentSize * 5;
    return currentSize;
  }

  function draw(e) {
    if (!isDrawing || !isActive) return;
    e.preventDefault();

    const pos = getPos(e);
    const x = pos.x, y = pos.y;

    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);

    if (currentTool === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(0,0,0,1)';
      ctx.lineWidth = getLineWidth();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
      ctx.globalCompositeOperation = 'source-over';
    } else if (currentTool === 'marker') {
      ctx.globalCompositeOperation = 'source-over';
      // Marker: semi-transparent, thick, blunt
      const col = hexToRgba(currentColor, 0.45);
      ctx.strokeStyle = col;
      ctx.lineWidth = getLineWidth();
      ctx.lineCap = 'square';
      ctx.lineJoin = 'bevel';
      ctx.stroke();
    } else {
      // Pencil: sharp, thin, slightly textured
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = hexToRgba(currentColor, 0.92);
      ctx.lineWidth = getLineWidth();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
    }

    lastX = x;
    lastY = y;
  }

  function stopDraw() {
    isDrawing = false;
    ctx.globalCompositeOperation = 'source-over';
  }

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', stopDraw);
  canvas.addEventListener('mouseleave', stopDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', draw, { passive: false });
  canvas.addEventListener('touchend', stopDraw);

  // ======= CLEAR =======
  document.getElementById('clearBtn').addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  });

  // ======= DRAG TOOLBAR =======
  const dragHandle = document.getElementById('dragHandle');
  let dragging = false;
  let dragOffX = 0, dragOffY = 0;

  dragHandle.addEventListener('mousedown', (e) => {
    dragging = true;
    const rect = toolbar.getBoundingClientRect();
    dragOffX = e.clientX - rect.left;
    dragOffY = e.clientY - rect.top;
    toolbar.style.transition = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const x = e.clientX - dragOffX;
    const y = e.clientY - dragOffY;
    toolbar.style.right = 'auto';
    toolbar.style.left = Math.max(0, Math.min(window.innerWidth - toolbar.offsetWidth, x)) + 'px';
    toolbar.style.top = Math.max(0, Math.min(window.innerHeight - toolbar.offsetHeight, y)) + 'px';
  });

  document.addEventListener('mouseup', () => {
    dragging = false;
    toolbar.style.transition = '';
  });

  // ======= KEYBOARD SHORTCUTS =======
  document.addEventListener('keydown', (e) => {
    if (!isActive) return;
    if (e.key === 'm' || e.key === 'M') setTool('mouse');
    if (e.key === 'p' || e.key === 'P') setTool('pencil');
    if (e.key === 'k' || e.key === 'K') setTool('marker');
    if (e.key === 'e' || e.key === 'E') setTool('eraser');
    if (e.key === 'Escape') deactivate();
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
      // simple undo: not implemented for canvas without history
    }
  });
</script>
</body>
</html>
