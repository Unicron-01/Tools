<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Annotator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 220px;
    background: #0d0d14;
    color: #e8e8f0;
    font-family: 'Syne', sans-serif;
    padding: 18px 16px;
    overflow: hidden;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, #7c6aff, #ff6a9e);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .logo-text {
    font-size: 0.85rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    line-height: 1.2;
  }

  .logo-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.52rem;
    color: #5a5a7a;
    letter-spacing: 0.08em;
  }

  .status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #13131a;
    border: 1px solid #1e1e2e;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 12px;
  }

  .status-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: #5a5a7a;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2a2a3a;
    transition: all 0.3s ease;
  }

  .status-dot.on {
    background: #06d6a0;
    box-shadow: 0 0 8px rgba(6, 214, 160, 0.6);
  }

  .toggle-btn {
    width: 100%;
    padding: 11px;
    border-radius: 8px;
    border: 1px solid #1e1e2e;
    background: #13131a;
    color: #e8e8f0;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 10px;
  }

  .toggle-btn:hover {
    background: rgba(124, 106, 255, 0.12);
    border-color: rgba(124, 106, 255, 0.4);
  }

  .toggle-btn.active {
    background: linear-gradient(135deg, #7c6aff22, #ff6a9e11);
    border-color: #7c6aff;
    color: #a898ff;
    box-shadow: 0 0 16px rgba(124,106,255,0.2);
  }

  .divider {
    height: 1px;
    background: #1e1e2e;
    margin: 10px 0;
  }

  .shortcuts {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    color: #3a3a5a;
    line-height: 1.8;
  }

  .shortcuts strong {
    color: #5a5a7a;
  }

  .kbd {
    display: inline-block;
    background: #1a1a28;
    border: 1px solid #2a2a3a;
    border-radius: 3px;
    padding: 0px 4px;
    font-size: 0.55rem;
    color: #7a7a9a;
    margin-right: 4px;
  }

  .tip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.56rem;
    color: #3a3a5a;
    text-align: center;
    margin-top: 10px;
    line-height: 1.5;
  }

  .tip span { color: #5a5a7a; }
</style>
</head>
<body>

<div class="logo">
  <div class="logo-icon">✏️</div>
  <div>
    <div class="logo-text">Annotator</div>
    <div class="logo-sub">// SCREEN DRAW TOOL</div>
  </div>
</div>

<div class="status-row">
  <span class="status-label" id="statusText">INACTIVE</span>
  <div class="status-dot" id="statusDot"></div>
</div>

<button class="toggle-btn" id="toggleBtn">⚡ Activate on This Page</button>

<div class="divider"></div>

<div class="shortcuts">
  <div><span class="kbd">M</span><strong>Mouse</strong> — normal mode</div>
  <div><span class="kbd">P</span><strong>Pencil</strong> — thin sharp lines</div>
  <div><span class="kbd">K</span><strong>Marker</strong> — thick highlight</div>
  <div><span class="kbd">E</span><strong>Eraser</strong> — remove drawing</div>
  <div><span class="kbd">Esc</span><strong>Deactivate</strong> toolbar</div>
</div>

<div class="tip">
  <span>Toolbar is draggable.</span><br>
  Works even when minimized ✓
</div>

<script src="popup.js"></script>
</body>
</html>
